[pytest]
; ── Browser options ────────────────────────────────────────────────────────
; --browser chromium | firefox | webkit   (chọn browser)
; --headed                                (chạy có UI, bỏ đi để chạy headless)

; ── Video recording ─────────────────────────────────────────────────────────
; --video=off                  → không quay (default)
; --video=on                   → quay tất cả test
; --video=retain-on-failure    → chỉ GIỮ LẠI video khi test FAIL, xóa khi pass
; --video=reuse                → tái sử dụng video file giữa các test

; ── Screenshot ──────────────────────────────────────────────────────────────
; --screenshot=off             → không chụp (default)
; --screenshot=on              → chụp tất cả
; --screenshot=only-on-failure → chỉ chụp khi test FAIL

; ── Cấu hình đang dùng ─────────────────────────────────────────────────────
addopts = -v -s
          --browser chromium
          --headed
          --video=retain-on-failure
          --screenshot=only-on-failure
          --html=pytest-report.html
          --self-contained-html