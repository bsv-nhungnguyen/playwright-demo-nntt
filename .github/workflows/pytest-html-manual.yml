name: Manual Pytest HTML Report

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Select what to run"
        required: true
        type: choice
        default: all
        options:
          - all
          - folder
          - file
      target_path:
        description: "Path to folder/file when run_mode is folder or file (e.g. tests/demo_automation or tests/demo_automation/test_demo.py)"
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser and OS deps
        run: |
          playwright install --with-deps chromium

      - name: Resolve pytest target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          MODE="${{ github.event.inputs.run_mode }}"
          TARGET_INPUT="${{ github.event.inputs.target_path }}"

          if [[ "$MODE" == "all" ]]; then
            TARGET="tests"
          else
            if [[ -z "$TARGET_INPUT" ]]; then
              echo "target_path is required when run_mode is $MODE"
              exit 1
            fi
            TARGET="$TARGET_INPUT"
          fi

          if [[ ! -e "$TARGET" ]]; then
            echo "Target does not exist: $TARGET"
            exit 1
          fi

          if [[ "$MODE" == "folder" && ! -d "$TARGET" ]]; then
            echo "Expected a folder but got: $TARGET"
            exit 1
          fi

          if [[ "$MODE" == "file" && ! -f "$TARGET" ]]; then
            echo "Expected a file but got: $TARGET"
            exit 1
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Prepare report metadata
        id: report_meta
        shell: bash
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y%m%d_%H%M%S)"
          REPORT_FILENAME="pytest-report-${STAMP}.html"
          REPORT_PATH="reports/${REPORT_FILENAME}"
          ARTIFACT_NAME="pytest-html-report-${STAMP}"

          echo "stamp=${STAMP}" >> "$GITHUB_OUTPUT"
          echo "report_filename=${REPORT_FILENAME}" >> "$GITHUB_OUTPUT"
          echo "report_path=${REPORT_PATH}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run tests and generate HTML report
        env:
          PYTHONBREAKPOINT: "0"
        shell: bash
        run: |
          mkdir -p reports
          pytest "${{ steps.target.outputs.target }}" \
            -o addopts="-v -s" \
            --browser chromium \
            --html="${{ steps.report_meta.outputs.report_path }}" \
            --self-contained-html

      - name: Upload pytest-html report
        if: always()
        id: upload_report
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.report_meta.outputs.artifact_name }}
          path: ${{ steps.report_meta.outputs.report_path }}
          if-no-files-found: warn

      - name: Add quick report links to run summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Pytest HTML Report"
            echo ""
            if [[ -n "${{ steps.upload_report.outputs.artifact-url }}" ]]; then
              echo "- Artifact: ${{ steps.report_meta.outputs.artifact_name }}"
              echo "- File: ${{ steps.report_meta.outputs.report_filename }}"
              echo "- Quick download: [${{ steps.report_meta.outputs.artifact_name }}](${{ steps.upload_report.outputs.artifact-url }})"
            else
              echo "- Artifact URL is unavailable for this run."
            fi
            echo "- Run summary page: [Open this workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "After downloading the artifact zip, extract and open ${{ steps.report_meta.outputs.report_filename }} in your browser."
          } >> "$GITHUB_STEP_SUMMARY"